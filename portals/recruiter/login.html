<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Recruiter Portal | StellarHire</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#003d9b",
                        "primary-container": "#0052cc",
                        "on-primary": "#ffffff",
                        "background": "#FFFFFF",
                        "surface": "#faf8ff",
                        "surface-muted": "#F4F5F7",
                        "border": "#DFE1E6",
                        "outline": "#737685",
                        "on-surface": "#191b23",
                        "neutral-subtle": "#6B778C",
                        "success": "#36B37E",
                        "error": "#ba1a1a"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface-muted text-on-surface antialiased min-h-screen flex flex-col justify-center items-center p-4 relative">
    <canvas id="stellar-wallpaper" class="fixed inset-0 w-full h-full pointer-events-none z-0 opacity-40"></canvas>

    <!-- Main Card -->
    <div class="w-full max-w-md bg-background border border-border rounded-2xl shadow-lg p-8 relative z-10">
        <!-- Logo -->
        <div class="flex items-center gap-2 justify-center mb-6">
            <span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">work</span>
            <span class="font-bold text-primary text-2xl">StellarHire</span>
        </div>

        <!-- Tab Switcher -->
        <div class="flex bg-surface-muted rounded-xl p-1 mb-6 gap-1">
            <button id="tab-login" onclick="switchTab('login')"
                class="flex-1 py-2 text-sm font-semibold rounded-lg transition-all duration-200 bg-background text-primary shadow-sm">
                Sign In
            </button>
            <button id="tab-register" onclick="switchTab('register')"
                class="flex-1 py-2 text-sm font-semibold rounded-lg transition-all duration-200 text-neutral-subtle hover:text-on-surface">
                Create Account
            </button>
        </div>

        <!-- ══ LOGIN PANEL ══ -->
        <div id="panel-login">
            <div class="text-center mb-6">
                <h2 class="text-xl font-bold text-on-surface">Recruiter Login</h2>
                <p class="text-sm text-neutral-subtle mt-1">Manage talent and resume screening analytics</p>
            </div>

            <form id="login-form" class="space-y-5">
                <div>
                    <label for="email" class="block text-sm font-semibold text-neutral-subtle mb-1">Email or Username</label>
                    <input type="text" id="email" required
                        class="w-full px-4 py-2 bg-background border border-border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                        placeholder="name@company.com or username">
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold text-neutral-subtle mb-1">Password</label>
                    <div class="relative">
                        <input type="password" id="password" required
                            class="w-full pl-4 pr-10 py-2 bg-background border border-border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                            placeholder="••••••••">
                        <button type="button" id="toggle-password"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-neutral-subtle hover:text-primary transition-colors">
                            <span class="material-symbols-outlined text-[20px]" id="eye-icon">visibility</span>
                        </button>
                    </div>
                </div>

                <div id="error-banner" class="hidden p-3 bg-red-50 border border-error/20 text-error rounded-lg text-xs flex items-center gap-2">
                    <span class="material-symbols-outlined text-[16px]">error</span>
                    <span id="error-message">Invalid email or password.</span>
                </div>

                <button type="submit" id="submit-btn"
                    class="w-full py-2.5 bg-primary text-on-primary font-bold rounded-lg hover:bg-primary-container transition-colors shadow-sm flex justify-center items-center gap-2">
                    Sign In
                    <span class="material-symbols-outlined text-[18px]">login</span>
                </button>
            </form>

        </div>

        <!-- ══ REGISTER PANEL ══ -->
        <div id="panel-register" class="hidden">
            <div class="text-center mb-6">
                <h2 class="text-xl font-bold text-on-surface">Create Recruiter Account</h2>
                <p class="text-sm text-neutral-subtle mt-1">Start hiring top talent on StellarHire</p>
            </div>

            <form id="register-form" class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label for="reg-name" class="block text-sm font-semibold text-neutral-subtle mb-1">Full Name</label>
                        <input type="text" id="reg-name" required
                            class="w-full px-4 py-2 bg-background border border-border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary transition-all"
                            placeholder="Jane Doe">
                    </div>
                    <div>
                        <label for="reg-username" class="block text-sm font-semibold text-neutral-subtle mb-1">Username</label>
                        <input type="text" id="reg-username" required
                            class="w-full px-4 py-2 bg-background border border-border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary transition-all"
                            placeholder="jane_hr">
                    </div>
                </div>

                <div>
                    <label for="reg-company" class="block text-sm font-semibold text-neutral-subtle mb-1">
                        <span class="material-symbols-outlined text-[15px] align-text-bottom">business</span>
                        Company Name
                    </label>
                    <input type="text" id="reg-company" required
                        class="w-full px-4 py-2 bg-background border border-border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary transition-all"
                        placeholder="Acme Technologies">
                </div>

                <div>
                    <label for="reg-email" class="block text-sm font-semibold text-neutral-subtle mb-1">Work Email</label>
                    <input type="email" id="reg-email" required
                        class="w-full px-4 py-2 bg-background border border-border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary transition-all"
                        placeholder="jane@acme.com">
                </div>

                <div>
                    <label for="reg-password" class="block text-sm font-semibold text-neutral-subtle mb-1">Password</label>
                    <div class="relative">
                        <input type="password" id="reg-password" required minlength="6"
                            class="w-full pl-4 pr-10 py-2 bg-background border border-border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary transition-all"
                            placeholder="Min. 6 characters">
                        <button type="button" id="toggle-reg-password"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-neutral-subtle hover:text-primary transition-colors">
                            <span class="material-symbols-outlined text-[20px]" id="eye-icon-reg">visibility</span>
                        </button>
                    </div>
                </div>

                <div>
                    <label for="reg-confirm" class="block text-sm font-semibold text-neutral-subtle mb-1">Confirm Password</label>
                    <input type="password" id="reg-confirm" required
                        class="w-full px-4 py-2 bg-background border border-border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary transition-all"
                        placeholder="Re-enter password">
                </div>

                <!-- Banners -->
                <div id="reg-error-banner" class="hidden p-3 bg-red-50 border border-error/20 text-error rounded-lg text-xs flex items-center gap-2">
                    <span class="material-symbols-outlined text-[16px]">error</span>
                    <span id="reg-error-message">Something went wrong.</span>
                </div>
                <div id="reg-success-banner" class="hidden p-3 bg-green-50 border border-success/20 text-success rounded-lg text-xs flex items-center gap-2">
                    <span class="material-symbols-outlined text-[16px]">check_circle</span>
                    <span>Account created! Redirecting to dashboard...</span>
                </div>

                <button type="submit" id="register-btn"
                    class="w-full py-2.5 bg-primary text-on-primary font-bold rounded-lg hover:bg-primary-container transition-colors shadow-sm flex justify-center items-center gap-2">
                    Create Account
                    <span class="material-symbols-outlined text-[18px]">person_add</span>
                </button>
            </form>
        </div>

        <!-- Back to Home -->
        <div class="text-center mt-6">
            <a href="/" class="text-xs text-primary hover:underline flex items-center justify-center gap-1">
                <span class="material-symbols-outlined text-[14px]">arrow_back</span>
                Back to Home
            </a>
        </div>
    </div>

    <script src="client.js"></script>
    <script>
        // ── Tab Switcher ──
        function switchTab(tab) {
            const isLogin = tab === 'login';
            document.getElementById('panel-login').classList.toggle('hidden', !isLogin);
            document.getElementById('panel-register').classList.toggle('hidden', isLogin);
            const tl = document.getElementById('tab-login');
            const tr = document.getElementById('tab-register');
            if (isLogin) {
                tl.classList.add('bg-background','text-primary','shadow-sm'); tl.classList.remove('text-neutral-subtle');
                tr.classList.remove('bg-background','text-primary','shadow-sm'); tr.classList.add('text-neutral-subtle');
            } else {
                tr.classList.add('bg-background','text-primary','shadow-sm'); tr.classList.remove('text-neutral-subtle');
                tl.classList.remove('bg-background','text-primary','shadow-sm'); tl.classList.add('text-neutral-subtle');
            }
        }
        window.switchTab = switchTab;

        // ── Password Visibility (Login) ──
        const pwInput = document.getElementById('password');
        document.getElementById('toggle-password').addEventListener('click', () => {
            const show = pwInput.type === 'password';
            pwInput.type = show ? 'text' : 'password';
            document.getElementById('eye-icon').innerText = show ? 'visibility_off' : 'visibility';
        });

        // ── Password Visibility (Register) ──
        const regPwInput = document.getElementById('reg-password');
        document.getElementById('toggle-reg-password').addEventListener('click', () => {
            const show = regPwInput.type === 'password';
            regPwInput.type = show ? 'text' : 'password';
            document.getElementById('eye-icon-reg').innerText = show ? 'visibility_off' : 'visibility';
        });


        // ── Login Submit ──
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = pwInput.value;
            const btn = document.getElementById('submit-btn');
            const errBanner = document.getElementById('error-banner');
            const errMsg = document.getElementById('error-message');

            btn.disabled = true;
            btn.innerHTML = 'Authenticating... <span class="material-symbols-outlined text-[18px]">progress_activity</span>';
            errBanner.classList.add('hidden');

            try {
                const result = await loginUser(email, password, 'recruiter');
                if (result) {
                    window.location.href = 'dashboard.html';
                } else {
                    throw new Error('Authentication failed.');
                }
            } catch (err) {
                errBanner.classList.remove('hidden');
                errMsg.innerText = err.message || 'Invalid credentials.';
                btn.disabled = false;
                btn.innerHTML = 'Sign In <span class="material-symbols-outlined text-[18px]">login</span>';
            }
        });

        // ── Register Submit ──
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name     = document.getElementById('reg-name').value.trim();
            const username = document.getElementById('reg-username').value.trim();
            const company  = document.getElementById('reg-company').value.trim();
            const email    = document.getElementById('reg-email').value.trim();
            const password = regPwInput.value;
            const confirm  = document.getElementById('reg-confirm').value;

            const errBanner  = document.getElementById('reg-error-banner');
            const errMsg     = document.getElementById('reg-error-message');
            const okBanner   = document.getElementById('reg-success-banner');
            const btn        = document.getElementById('register-btn');

            errBanner.classList.add('hidden');
            okBanner.classList.add('hidden');

            if (password !== confirm) {
                errBanner.classList.remove('hidden');
                errMsg.innerText = 'Passwords do not match.';
                return;
            }
            if (password.length < 6) {
                errBanner.classList.remove('hidden');
                errMsg.innerText = 'Password must be at least 6 characters.';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = 'Creating Account... <span class="material-symbols-outlined text-[18px]">progress_activity</span>';

            try {
                const result = await apiPost('/auth/register-recruiter', { name, username, email, password, company });
                if (result.success) {
                    sessionStorage.setItem('stellar_user', JSON.stringify(result));
                    okBanner.classList.remove('hidden');
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
                }
            } catch (err) {
                errBanner.classList.remove('hidden');
                errMsg.innerText = err.message || 'Registration failed. Please try again.';
                btn.disabled = false;
                btn.innerHTML = 'Create Account <span class="material-symbols-outlined text-[18px]">person_add</span>';
            }
        });
    </script>
    <script>
        // Particle background
        (function() {
            const canvas = document.getElementById('stellar-wallpaper');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let w = canvas.width = window.innerWidth;
            let h = canvas.height = window.innerHeight;
            window.addEventListener('resize', () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; });
            const pts = Array.from({length: 40}, () => ({
                x: Math.random()*w, y: Math.random()*h,
                vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4,
                r: Math.random()*2+1
            }));
            function frame() {
                ctx.clearRect(0,0,w,h);
                pts.forEach((p,i) => {
                    p.x+=p.vx; p.y+=p.vy;
                    if(p.x<0||p.x>w) p.vx*=-1;
                    if(p.y<0||p.y>h) p.vy*=-1;
                    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
                    ctx.fillStyle='rgba(101,84,192,0.4)'; ctx.fill();
                    for(let j=i+1;j<pts.length;j++){
                        const q=pts[j], d=Math.hypot(p.x-q.x,p.y-q.y);
                        if(d<120){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);
                        ctx.strokeStyle=`rgba(0,82,204,${0.15*(1-d/120)})`;ctx.lineWidth=0.5;ctx.stroke();}
                    }
                });
                requestAnimationFrame(frame);
            }
            frame();
        })();
    </script>
</body>
</html>
