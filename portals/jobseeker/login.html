<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Job Seeker Login | StellarHire</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#003d9b",
                        "primary-container": "#0052cc",
                        "on-primary": "#ffffff",
                        "background": "#FFFFFF",
                        "surface": "#faf8ff",
                        "surface-muted": "#F4F5F7",
                        "border": "#DFE1E6",
                        "outline": "#737685",
                        "on-surface": "#191b23",
                        "neutral-subtle": "#6B778C",
                        "success": "#36B37E",
                        "error": "#ba1a1a"
                    }
                }
            }
        }
    </script>
    <style>
        .tab-active { border-bottom: 3px solid #003d9b; color: #003d9b; font-weight: 700; }
        .tab-inactive { border-bottom: 3px solid transparent; color: #6B778C; }
        .tab-inactive:hover { color: #003d9b; border-color: #DFE1E6; }
    </style>
</head>
<body class="bg-surface-muted text-on-surface font-body-md antialiased min-h-screen flex flex-col justify-center items-center p-4">
    <!-- Main Card -->
    <div class="w-full max-w-md bg-background border border-border rounded-2xl shadow-lg relative overflow-hidden">
        <!-- Logo -->
        <div class="flex items-center gap-2 justify-center pt-8 pb-4">
            <span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">work</span>
            <span class="text-headline-md font-bold text-primary text-2xl">StellarHire</span>
        </div>

        <!-- Tabs -->
        <div class="flex border-b border-border px-8">
            <button id="tab-signin" onclick="switchTab('signin')" class="flex-1 py-3 text-sm text-center transition-all tab-active">Sign In</button>
            <button id="tab-signup" onclick="switchTab('signup')" class="flex-1 py-3 text-sm text-center transition-all tab-inactive">Create Account</button>
        </div>

        <!-- Sign In Form -->
        <div id="form-signin" class="p-8">
            <div class="text-center mb-6">
                <h2 class="text-xl font-bold text-on-surface">Welcome Back</h2>
                <p class="text-body-sm text-neutral-subtle mt-1">Sign in to your job seeker dashboard</p>
            </div>

            <form id="login-form" class="space-y-5">
                <div>
                    <label for="email" class="block text-sm font-semibold text-neutral-subtle mb-1">Email or Username</label>
                    <input type="text" id="email" required class="w-full px-4 py-2 bg-background border border-border rounded-lg text-body-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="Username or email">
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold text-neutral-subtle mb-1">Password</label>
                    <div class="relative">
                        <input type="password" id="password" required class="w-full pl-4 pr-10 py-2 bg-background border border-border rounded-lg text-body-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="••••••••">
                        <button type="button" id="toggle-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-neutral-subtle hover:text-primary transition-colors">
                            <span class="material-symbols-outlined text-[20px]" id="eye-icon">visibility</span>
                        </button>
                    </div>
                </div>

                <!-- Error Banner -->
                <div id="error-banner" class="hidden p-3 bg-red-50 border border-error/20 text-error rounded-lg text-xs flex items-center gap-2">
                    <span class="material-symbols-outlined text-[16px]">error</span>
                    <span id="error-message">Invalid email or password.</span>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submit-btn" class="w-full py-2.5 bg-primary text-on-primary font-bold rounded-lg hover:bg-primary-container transition-colors shadow-sm flex justify-center items-center gap-2">
                    Sign In
                    <span class="material-symbols-outlined text-[18px]">login</span>
                </button>
            </form>

        </div>

        <!-- Sign Up Form -->
        <div id="form-signup" class="p-8 hidden">
            <div class="text-center mb-6">
                <h2 class="text-xl font-bold text-on-surface">Create Your Account</h2>
                <p class="text-body-sm text-neutral-subtle mt-1">Enter your details to get started</p>
            </div>

            <form id="register-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-neutral-subtle mb-1">Full Name <span class="text-error">*</span></label>
                    <input type="text" id="reg-name" required class="w-full px-4 py-2 bg-background border border-border rounded-lg text-body-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="Rahul Sharma">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-neutral-subtle mb-1">Username <span class="text-error">*</span></label>
                    <input type="text" id="reg-username" required minlength="3" class="w-full px-4 py-2 bg-background border border-border rounded-lg text-body-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="rahulsharma">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-neutral-subtle mb-1">Email Address <span class="text-error">*</span></label>
                    <input type="email" id="reg-email" required class="w-full px-4 py-2 bg-background border border-border rounded-lg text-body-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="rahul@email.com">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-neutral-subtle mb-1">Password <span class="text-error">*</span></label>
                    <input type="password" id="reg-password" required minlength="6" class="w-full px-4 py-2 bg-background border border-border rounded-lg text-body-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="Min 6 characters">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-semibold text-neutral-subtle mb-1">Phone</label>
                        <input type="tel" id="reg-phone" class="w-full px-4 py-2 bg-background border border-border rounded-lg text-body-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="+91 98765 43210">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-neutral-subtle mb-1">Location</label>
                        <select id="reg-location" class="w-full px-4 py-2 bg-background border border-border rounded-lg text-body-sm focus:outline-none focus:ring-2 focus:ring-primary cursor-pointer">
                            <option value="">Select city</option>
                            <option value="Bengaluru, KA">Bengaluru</option>
                            <option value="Mumbai, MH">Mumbai</option>
                            <option value="Hyderabad, TG">Hyderabad</option>
                            <option value="Chennai, TN">Chennai</option>
                            <option value="Pune, MH">Pune</option>
                            <option value="Delhi NCR">Delhi NCR</option>
                            <option value="Remote - India">Remote</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-neutral-subtle mb-1">Key Skills <span class="text-neutral-subtle text-xs font-normal">(comma separated)</span></label>
                    <input type="text" id="reg-skills" class="w-full px-4 py-2 bg-background border border-border rounded-lg text-body-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="e.g. React, Python, Machine Learning">
                </div>

                <!-- Error Banner -->
                <div id="reg-error-banner" class="hidden p-3 bg-red-50 border border-error/20 text-error rounded-lg text-xs flex items-center gap-2">
                    <span class="material-symbols-outlined text-[16px]">error</span>
                    <span id="reg-error-message">Registration failed.</span>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="reg-submit-btn" class="w-full py-2.5 bg-primary text-on-primary font-bold rounded-lg hover:bg-primary-container transition-colors shadow-sm flex justify-center items-center gap-2">
                    Create Account
                    <span class="material-symbols-outlined text-[18px]">person_add</span>
                </button>
            </form>
        </div>

        <div class="text-center pb-6 px-8">
            <a href="/" class="text-xs text-primary hover:underline flex items-center justify-center gap-1">
                <span class="material-symbols-outlined text-[14px]">arrow_back</span>
                Back to Home
            </a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="client.js"></script>
    <script>
        // Tab Switching
        function switchTab(tab) {
            const signinTab = document.getElementById('tab-signin');
            const signupTab = document.getElementById('tab-signup');
            const signinForm = document.getElementById('form-signin');
            const signupForm = document.getElementById('form-signup');

            if (tab === 'signin') {
                signinTab.className = signinTab.className.replace('tab-inactive', 'tab-active');
                signupTab.className = signupTab.className.replace('tab-active', 'tab-inactive');
                signinForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
            } else {
                signupTab.className = signupTab.className.replace('tab-inactive', 'tab-active');
                signinTab.className = signinTab.className.replace('tab-active', 'tab-inactive');
                signupForm.classList.remove('hidden');
                signinForm.classList.add('hidden');
            }
        }

        // Password visibility toggle
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('toggle-password');
        const eyeIcon = document.getElementById('eye-icon');

        togglePasswordBtn.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerText = 'visibility';
            }
        });


        // Sign In Form Submit
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = passwordInput.value;
            const submitBtn = document.getElementById('submit-btn');
            const errorBanner = document.getElementById('error-banner');
            const errorMessage = document.getElementById('error-message');

            submitBtn.disabled = true;
            submitBtn.innerText = 'Authenticating...';
            errorBanner.classList.add('hidden');

            try {
                const result = await loginUser(email, password, 'seeker');
                if (result) {
                    window.location.href = 'dashboard.html';
                } else {
                    throw new Error('Authentication failed.');
                }
            } catch (err) {
                errorBanner.classList.remove('hidden');
                errorMessage.innerText = err.message || 'Invalid credentials or connection issue.';
                submitBtn.disabled = false;
                submitBtn.innerHTML = `Sign In <span class="material-symbols-outlined text-[18px]">login</span>`;
            }
        });

        // Sign Up Form Submit
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value.trim();
            const username = document.getElementById('reg-username').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const phone = document.getElementById('reg-phone').value.trim();
            const location = document.getElementById('reg-location').value;
            const skillsRaw = document.getElementById('reg-skills').value.trim();
            const skills = skillsRaw ? skillsRaw.split(',').map(s => s.trim()).filter(Boolean) : [];

            const submitBtn = document.getElementById('reg-submit-btn');
            const errorBanner = document.getElementById('reg-error-banner');
            const errorMessage = document.getElementById('reg-error-message');

            submitBtn.disabled = true;
            submitBtn.innerText = 'Creating Account...';
            errorBanner.classList.add('hidden');

            try {
                const result = await apiPost('/auth/register', { name, username, email, password, phone, location, skills });
                if (result.success) {
                    // Auto-login after registration
                    sessionStorage.setItem('stellar_user', JSON.stringify(result));
                    alert(`✅ Welcome to StellarHire, ${name}! Your account has been created.`);
                    window.location.href = 'dashboard.html';
                } else {
                    throw new Error(result.message || 'Registration failed.');
                }
            } catch (err) {
                errorBanner.classList.remove('hidden');
                errorMessage.innerText = err.message || 'Registration failed. Please try again.';
                submitBtn.disabled = false;
                submitBtn.innerHTML = `Create Account <span class="material-symbols-outlined text-[18px]">person_add</span>`;
            }
        });
    </script>
</body>
</html>
